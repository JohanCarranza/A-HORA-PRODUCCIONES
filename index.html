<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-HORA PRODUCCIONES</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header class="hero">
        <h1 class="main-title">A-HORA</h1>
        <h2 class="sub-title">PRODUCCIONES</h2>
    </header>

    <main class="container">
        <div class="tape-label">IDENTIDAD</div>
        <div class="vintage-box">
            <h2>SOMOS A-HORA</h2>
            <p>Capturamos el presente con la estética del pasado y la tecnología del futuro.</p>
        </div>

        <div class="work-row">
            <div class="row-header">📸 PORTAFOLIO FOTOGRÁFICO</div>
            <div class="row-buttons">
                <button class="btn-category" onclick="abrirGaleria('DEPORTIVA')">DEPORTIVA</button>
                <button class="btn-category" onclick="abrirGaleria('CORPORATIVA')">CORPORATIVA</button>
                <button class="btn-category" onclick="abrirGaleria('EVENTOS')">EVENTO SOCIAL</button>
                <button class="btn-category" onclick="abrirGaleria('PRODUCTO')">PRODUCTO</button>
            </div>
        </div>

        <div class="work-row">
            <div class="row-header">🎬 STREAMING EN VIVO</div>
            <div class="row-buttons">
                <button class="btn-category" style="background:var(--ink); color:var(--yellow);" onclick="abrirGaleria('STREAMING')">VER TRANSMISIONES</button>
            </div>
        </div>

        <div class="work-row">
            <div class="row-header">🎞️ FILMMAKING / REELS</div>
            <div class="row-buttons">
                <button class="btn-category" onclick="abrirGaleria('CORPORATIVO_V')">CORPORATIVO</button>
                <button class="btn-category" onclick="abrirGaleria('SOCIAL_MEDIA_V')">SOCIAL MEDIA</button>
                <button class="btn-category" onclick="abrirGaleria('DRON_V')">DRON</button>
            </div>
        </div>

        <div class="tape-label">ELLOS CONFÍAN EN NOSOTROS</div>
        <div class="aliados-section">
            <div class="slider-track">
                <div class="slide"><img src="./assets/images/marca1.png"></div>
                <div class="slide"><img src="./assets/images/marca2.png"></div>
                <div class="slide"><img src="./assets/images/marca3.png"></div>
                <div class="slide"><img src="./assets/images/marca4.png"></div>
                <div class="slide"><img src="./assets/images/marca5.png"></div>
                <div class="slide"><img src="./assets/images/marca6.png"></div>
                <div class="slide"><img src="./assets/images/marca7.jpg"></div>
                <div class="slide"><img src="./assets/images/marca8.jpg"></div>
                <div class="slide"><img src="./assets/images/marca9.png"></div>
                <div class="slide"><img src="./assets/images/marca1.png"></div>
                <div class="slide"><img src="./assets/images/marca2.png"></div>
                <div class="slide"><img src="./assets/images/marca3.png"></div>
                <div class="slide"><img src="./assets/images/marca4.png"></div>
                <div class="slide"><img src="./assets/images/marca5.png"></div>
                <div class="slide"><img src="./assets/images/marca6.png"></div>
                <div class="slide"><img src="./assets/images/marca7.jpg"></div>
                <div class="slide"><img src="./assets/images/marca8.jpg"></div>
                <div class="slide"><img src="./assets/images/marca9.png"></div>
            </div>
        </div>

        <div class="tape-label">CENTRAL DE CONTROL</div>
        <div id="pautas-contenedor" class="monitor-screen"></div>
    </main>

    <div id="modal-galeria" class="modal">
        <div class="modal-content vintage-box">
            <span class="close-btn" onclick="cerrarGaleria()">&times;</span>
            <h2 id="modal-titulo" style="font-family:'Bungee'; border-bottom: 3px solid var(--yellow); display:inline-block;">GALERÍA</h2>
            <div id="modal-imagenes" class="gallery-grid"></div>
        </div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>
</html>
