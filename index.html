<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-HORA PRODUCCIONES | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <header class="hero">
        <h1 class="main-title">A-HORA</h1>
        <h2 class="sub-title">PRODUCCIONES</h2>
    </header>

    <main class="landing-container">
        
        <section class="landing-section">
            <div class="section-text">
                <h2>FOTOGRAFÍA</h2>
                <p>Narrativa visual en cada disparo. Capturamos momentos únicos con estética cinematográfica.</p>
                <div class="row-buttons">
                    <button class="btn-category" onclick="abrirGaleria('DEPORTIVA')">DEPORTIVA</button>
                    <button class="btn-category" onclick="abrirGaleria('CORPORATIVA')">CORPORATIVA</button>
                    <button class="btn-category" onclick="abrirGaleria('EVENTOS')">SOCIAL</button>
                    <button class="btn-category" onclick="abrirGaleria('PRODUCTO')">PRODUCTO</button>
                </div>
            </div>
            <div class="section-visual">
                <img src="./assets/images/Social1.jpg" alt="Preview Foto" style="width:100%; display:block;">
            </div>
        </section>

        <section class="landing-section reverse">
            <div class="section-text">
                <h2>STREAMING</h2>
                <p>Transmisiones en vivo de alta fidelidad. Llevamos tu evento a todo el mundo con calidad de TV.</p>
                <button class="btn-category" style="background:var(--ink); color:var(--yellow);" onclick="abrirGaleria('STREAMING')">VER TRANSMISIONES</button>
            </div>
            <div class="section-visual">
                <img src="./assets/images/streaming1.png" alt="Preview Streaming" style="width:100%; display:block;">
            </div>
        </section>

        <div class="monitor-wide" id="pautas-contenedor">
            </div>

    </main>

    <div id="modal-galeria" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarGaleria()">&times;</span>
            <h2 id="modal-titulo" style="font-family:'Bungee';">GALERÍA</h2>
            <div id="modal-imagenes" class="gallery-grid"></div>
        </div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>
</html>
